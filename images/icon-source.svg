<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2c2547"/>
      <stop offset="1" stop-color="#13111d"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.46" r="0.55">
      <stop offset="0" stop-color="#ff9a3c" stop-opacity="0.45"/>
      <stop offset="0.6" stop-color="#ff7a18" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#ff7a18" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="arc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe1a3"/>
      <stop offset="0.5" stop-color="#ffb347"/>
      <stop offset="1" stop-color="#ff7a18"/>
    </linearGradient>
  </defs>

  <!-- squircle background -->
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#glow)"/>

  <!-- track ring -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="#3b3556" stroke-width="26"/>

  <!-- countdown progress arc (~75%, starts at top, clockwise) -->
  <path d="M256,106 A150,150 0 1 1 106,256"
        fill="none" stroke="url(#arc)" stroke-width="26" stroke-linecap="round"/>

  <!-- clock hands (classic 10:10) -->
  <line x1="256" y1="256" x2="196" y2="221" stroke="#fff4e6" stroke-width="17" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="338" y2="209" stroke="#fff4e6" stroke-width="13" stroke-linecap="round"/>

  <!-- center hub -->
  <circle cx="256" cy="256" r="13" fill="#ff7a18"/>
  <circle cx="256" cy="256" r="5" fill="#fff4e6"/>
</svg>
